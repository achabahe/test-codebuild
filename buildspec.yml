version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
env:
  secrets-manager:
    GITHUB_TOKEN: ProvisioningSecrets:GithubPersonalToken
  variables:
    NODE_ENV: "production"
    BRAND: "default"
    API_BASE_URL: "https://api.example.com"

phases:
  install:
    commands:
      - echo "=== No dependencies to install for static project ==="

  pre_build:
    commands:
      - echo "=== Pre-build checks ==="
      - echo "BRAND        -> $BRAND"
      - echo "API_BASE_URL -> $API_BASE_URL"
      - echo "NODE_ENV     -> $NODE_ENV"
      - npm i
  build:
    commands:
      - echo "=== Building static files ==="
      - npm run build -- --brand-$BRAND_NAME

  post_build:
    commands:
      - echo "=== Build complete at $(date) ==="

artifacts:
  files:
    - '**/*'
  base-directory: dist
  discard-paths: no
